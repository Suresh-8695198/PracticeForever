<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="15" fill="#f5f3ff" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#7c3aed" text-anchor="middle">Logical Games</text>
  
  <g transform="translate(60,60)">
    <!-- Grid representing a logic table -->
    <rect x="0" y="0" width="280" height="100" rx="4" fill="white" stroke="#c4b5fd" />
    <line x1="70" y1="0" x2="70" y2="100" stroke="#c4b5fd" />
    <line x1="140" y1="0" x2="140" y2="100" stroke="#c4b5fd" />
    <line x1="210" y1="0" x2="210" y2="100" stroke="#c4b5fd" />
    <line x1="0" y1="25" x2="280" y2="25" stroke="#c4b5fd" />
    <line x1="0" y1="50" x2="280" y2="50" stroke="#c4b5fd" />
    <line x1="0" y1="75" x2="280" y2="75" stroke="#c4b5fd" />
    
    <!-- Icons inside the grid -->
    <circle cx="35" cy="37.5" r="5" fill="#8b5cf6" />
    <rect x="100" y="32.5" width="10" height="10" fill="#10b981" />
    <path d="M 170 32.5 L 180 42.5 M 180 32.5 L 170 42.5" stroke="#ef4444" stroke-width="2" />
    <circle cx="245" cy="37.5" r="5" fill="#8b5cf6" />
  </g>
  
  <text x="200" y="185" font-family="Arial" font-size="11" fill="#6d28d9" text-anchor="middle">Construct diagrams and use constraints to solve complex logic puzzles.</text>
</svg>

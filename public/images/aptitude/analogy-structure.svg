<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="150" rx="15" fill="#f5f3ff" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#5b21b6" text-anchor="middle">Analogy Structure</text>
  
  <g font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">
    <text x="80" y="85" fill="#7c3aed">A</text>
    <text x="110" y="85" fill="#94a3b8">:</text>
    <text x="140" y="85" fill="#7c3aed">B</text>
    
    <text x="200" y="85" fill="#94a3b8">::</text>
    
    <text x="260" y="85" fill="#2563eb">C</text>
    <text x="290" y="85" fill="#94a3b8">:</text>
    <text x="320" y="85" fill="#2563eb">D</text>
  </g>
  
  <path d="M 80 100 Q 110 130 140 100" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#purple-arrow)" />
  <text x="110" y="140" font-family="Arial" font-size="10" fill="#7c3aed" text-anchor="middle">Relationship 1</text>
  
  <path d="M 260 100 Q 290 130 320 100" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#blue-arrow)" />
  <text x="290" y="140" font-family="Arial" font-size="10" fill="#2563eb" text-anchor="middle">Relationship 2 (Same)</text>
  
  <defs>
    <marker id="purple-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
    <marker id="blue-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>
</svg>

<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="50" y="40" width="100" height="120" rx="10" fill="white" stroke="#3b82f6" stroke-width="4" />
  
  <!-- "Screen" -->
  <rect x="65" y="55" width="70" height="25" rx="4" fill="#f1f5f9" />
  <text x="75" y="73" fill="#3b82f6" font-family="Arial" font-weight="bold" font-size="14">% YIELD</text>
  
  <!-- Buttons -->
  <rect x="65" y="95" width="20" height="20" rx="4" fill="#3b82f6" fill-opacity="0.2" />
  <text x="71" y="110" fill="#3b82f6" font-family="Arial" font-weight="bold" font-size="14">+</text>
  
  <rect x="90" y="95" width="20" height="20" rx="4" fill="#3b82f6" fill-opacity="0.2" />
  <text x="96" y="110" fill="#3b82f6" font-family="Arial" font-weight="bold" font-size="14">×</text>
  
  <rect x="115" y="95" width="20" height="20" rx="4" fill="#3b82f6" fill-opacity="0.2" />
  <text x="123" y="110" fill="#3b82f6" font-family="Arial" font-weight="bold" font-size="14">/</text>
  
  <rect x="65" y="125" width="70" height="20" rx="4" fill="#3b82f6" />
  <text x="85" y="140" fill="white" font-family="Arial" font-weight="bold" font-size="12">INVEST</text>
</svg>

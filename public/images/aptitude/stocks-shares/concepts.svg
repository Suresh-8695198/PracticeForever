<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ss-grad1" x1="40" y1="40" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <filter id="ss-glow" x="0" y="0" width="200" height="200" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Share Certificate Background -->
  <rect x="40" y="50" width="120" height="80" rx="4" fill="white" stroke="#3b82f6" stroke-width="2" />
  <rect x="50" y="60" width="100" height="4" rx="2" fill="#e2e8f0" />
  <rect x="50" y="70" width="60" height="4" rx="2" fill="#e2e8f0" />
  
  <!-- Face Value Label -->
  <rect x="50" y="90" width="40" height="20" rx="4" fill="#3b82f6" fill-opacity="0.1" />
  <text x="55" y="104" fill="#3b82f6" font-family="Arial" font-weight="bold" font-size="10">F.V.</text>
  
  <!-- Coin (Dividend) -->
  <circle cx="150" cy="140" r="25" fill="#fbbf24" filter="url(#ss-glow)" />
  <circle cx="150" cy="140" r="18" fill="none" stroke="white" stroke-width="2" />
  <text x="143" y="148" fill="white" font-family="Arial" font-weight="bold" font-size="20">$</text>
  
  <!-- Market Price Tag -->
  <path d="M140 60 L160 60 L170 75 L160 90 L140 90 Z" fill="#ef4444" />
  <circle cx="148" cy="75" r="3" fill="white" />
</svg>

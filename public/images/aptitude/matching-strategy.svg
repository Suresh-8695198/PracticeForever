<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="15" fill="#f5f3ff" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#7c3aed" text-anchor="middle">Strategic Approach</text>
  
  <g transform="translate(40,60)">
    <circle cx="20" cy="20" r="15" fill="#8b5cf6" />
    <text x="20" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">1</text>
    <text x="45" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#5b21b6">Keywords</text>
    <text x="45" y="45" font-family="Arial" font-size="11" fill="#6d28d9">Highlight technical terms.</text>
    
    <circle cx="160" cy="20" r="15" fill="#8b5cf6" />
    <text x="160" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">2</text>
    <text x="185" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#5b21b6">Context</text>
    <text x="185" y="45" font-family="Arial" font-size="11" fill="#6d28d9">Identify subject area.</text>
    
    <circle cx="280" cy="20" r="15" fill="#8b5cf6" />
    <text x="280" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3</text>
    <text x="305" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#5b21b6">Precision</text>
    <text x="305" y="45" font-family="Arial" font-size="11" fill="#6d28d9">Check every part of definition.</text>
  </g>
  
  <rect x="50" y="140" width="300" height="40" rx="20" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" />
  <text x="200" y="165" font-family="Arial" font-size="13" font-weight="bold" fill="#7c3aed" text-anchor="middle">Precision &gt; Generalization</text>
</svg>

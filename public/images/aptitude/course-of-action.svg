<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hand-drawn style Decision Tree/Flow for Course of Action -->
  <!-- Start Point -->
  <circle cx="100" cy="40" r="15" fill="none" stroke="#f43f5e" stroke-width="4" stroke-linecap="round" />
  <text x="94" y="44" font-family="sans-serif" font-size="12" fill="#f43f5e" font-weight="bold">!</text>
  
  <!-- Path Down -->
  <path d="M100 55 L100 80" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-dasharray="4,4" />
  
  <!-- Decision Box -->
  <path d="M60 80 L140 80 L150 100 L140 120 L60 120 L50 100 Z" fill="none" stroke="#10b981" stroke-width="3" stroke-linejoin="round" />
  
  <!-- Options -->
  <path d="M80 120 Q60 140 40 160" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" from="0, 50" to="50, 0" dur="1.5s" repeatCount="indefinite" />
  </path>
  <path d="M120 120 Q140 140 160 160" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" from="0, 50" to="50, 0" dur="1.5s" repeatCount="indefinite" />
  </path>
  
  <!-- Final Action Circles -->
  <circle cx="35" cy="170" r="10" fill="none" stroke="#3b82f6" stroke-width="2" />
  <circle cx="165" cy="170" r="10" fill="none" stroke="#3b82f6" stroke-width="2" />
  
  <text x="75" y="105" font-family="sans-serif" font-size="10" fill="#10b981">ACTION</text>
</svg>

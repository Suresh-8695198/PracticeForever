<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="15" fill="#f5f3ff" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#7c3aed" text-anchor="middle">Making Judgments</text>
  
  <rect x="40" y="60" width="320" height="100" rx="8" fill="white" stroke="#c4b5fd" />
  
  <g transform="translate(60,80)">
    <rect x="0" y="0" width="280" height="20" rx="4" fill="#ede9fe" />
    <text x="10" y="14" font-family="Arial" font-size="11" fill="#5b21b6">Scenario: Choose the best action based on rules...</text>
    
    <circle cx="10" cy="40" r="6" fill="#8b5cf6" />
    <text x="25" y="44" font-family="Arial" font-size="10" fill="#6d28d9">Option A: Rule Violation</text>
    
    <circle cx="10" cy="60" r="6" fill="#10b981" />
    <text x="25" y="64" font-family="Arial" font-size="10" fill="#065f46" font-weight="bold">Option B: Valid Judgment (Match)</text>
    
    <path d="M 0 30 L 280 30" stroke="#ddd" stroke-dasharray="2" />
  </g>
  
  <text x="200" y="185" font-family="Arial" font-size="11" fill="#6d28d9" text-anchor="middle">Analyze facts against criteria to reach the logical conclusion.</text>
</svg>

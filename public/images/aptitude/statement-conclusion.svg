<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hand-drawn style for Statement and Conclusion -->
  <!-- Statement Block -->
  <rect x="40" y="40" width="120" height="40" rx="8" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round" />
  <text x="55" y="65" font-family="sans-serif" font-size="14" fill="#8b5cf6" font-weight="bold">STATEMENT</text>
  <line x1="50" y1="55" x2="150" y2="55" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="2,2" />
  <line x1="50" y1="70" x2="130" y2="70" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="2,2" />

  <!-- Logical Flow Arrow -->
  <path d="M100 85 L100 120" fill="none" stroke="#ec4899" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ec4899" />
    </marker>
  </defs>
  <text x="110" y="105" font-family="sans-serif" font-size="10" fill="#ec4899" font-style="italic">Inference</text>

  <!-- Conclusion Block -->
  <rect x="40" y="130" width="120" height="40" rx="8" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
  <text x="52" y="155" font-family="sans-serif" font-size="14" fill="#10b981" font-weight="bold">CONCLUSION</text>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="3" fill="#8b5cf6" opacity="0.5" />
  <circle cx="170" cy="170" r="3" fill="#10b981" opacity="0.5" />
</svg>

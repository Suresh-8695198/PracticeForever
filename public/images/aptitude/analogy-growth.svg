<svg width="400" height="180" viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="180" rx="15" fill="#fff7ed" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#9a3412" text-anchor="middle">Growth/Stage Analogy</text>
  
  <!-- Baby to Adult -->
  <g transform="translate(50, 60)">
    <circle cx="30" cy="40" r="20" fill="#fed7aa" stroke="#9a3412" />
    <text x="30" y="80" font-family="Arial" font-size="12" fill="#9a3412" text-anchor="middle">Baby</text>
    <path d="M 60 40 L 100 40" stroke="#9a3412" stroke-width="2" marker-end="url(#arrow)" />
    <rect x="110" y="10" width="40" height="60" rx="5" fill="#fdba74" stroke="#9a3412" />
    <text x="130" y="80" font-family="Arial" font-size="12" fill="#9a3412" text-anchor="middle">Adult</text>
  </g>
  
  <!-- Bud to Flower -->
  <g transform="translate(50, 110)">
    <path d="M 20 40 Q 30 10 40 40 Z" fill="#bbf7d0" stroke="#166534" />
    <text x="30" y="55" font-family="Arial" font-size="10" fill="#166534" text-anchor="middle">Bud</text>
    <path d="M 60 30 L 100 30" stroke="#166534" stroke-width="2" marker-end="url(#green-arrow)" />
    <path d="M 120 30 M 110 20 Q 130 0 150 20 Q 170 30 150 40 Q 130 50 110 30 Z" fill="#fecaca" stroke="#b91c1c" />
    <text x="130" y="55" font-family="Arial" font-size="10" fill="#b91c1c" text-anchor="middle">Flower</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9a3412" />
    </marker>
    <marker id="green-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#166534" />
    </marker>
  </defs>
</svg>

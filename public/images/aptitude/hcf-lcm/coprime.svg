<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cp-grad1" x1="40" y1="40" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" />
      <stop offset="1" stop-color="#059669" />
    </linearGradient>
  </defs>
  
  <!-- Two distinct shapes -->
  <rect x="50" y="60" width="40" height="40" rx="10" fill="url(#cp-grad1)" opacity="0.2" stroke="#10B981" stroke-width="2" />
  <circle cx="140" cy="110" r="25" fill="url(#cp-grad1)" opacity="0.2" stroke="#059669" stroke-width="2" />
  
  <!-- Connection Bridge -->
  <path d="M90 80 C110 80 115 110 120 110" stroke="#10B981" stroke-width="2" stroke-dasharray="3 3" />
  
  <!-- The number 1 in the middle -->
  <rect x="95" y="85" width="30" height="30" rx="15" fill="white" stroke="#10B981" stroke-width="2" />
  <text x="106" y="106" fill="#10B981" font-family="Arial" font-weight="bold" font-size="18">1</text>
  
  <!-- Exclusive indicators -->
  <circle cx="70" cy="80" r="3" fill="#10B981" />
  <circle cx="140" cy="110" r="3" fill="#059669" />
</svg>

<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frac-grad" x1="100" y1="40" x2="100" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EC4899" />
      <stop offset="1" stop-color="#DB2777" />
    </linearGradient>
  </defs>
  
  <!-- Fraction Bar -->
  <rect x="60" y="95" width="80" height="6" rx="3" fill="#EC4899" />
  
  <!-- Numerator Box -->
  <rect x="75" y="45" width="50" height="40" rx="8" fill="#EC4899" fill-opacity="0.1" stroke="#EC4899" stroke-width="2" />
  <text x="82" y="70" fill="#EC4899" font-family="Arial" font-weight="bold" font-size="12">Num</text>
  
  <!-- Denominator Box -->
  <rect x="75" y="115" width="50" height="40" rx="8" fill="#EC4899" fill-opacity="0.1" stroke="#EC4899" stroke-width="2" />
  <text x="82" y="140" fill="#EC4899" font-family="Arial" font-weight="bold" font-size="12">Den</text>
  
  <!-- Division Icon decoration -->
  <circle cx="100" cy="30" r="4" fill="#EC4899" />
  <circle cx="100" cy="170" r="4" fill="#EC4899" />
</svg>

<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="150" rx="15" fill="#f0f9ff" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">Antonym Analogy (Opposites)</text>
  
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="100" height="40" rx="20" fill="#bae6fd" stroke="#0369a1" />
    <text x="50" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">CREATE</text>
    
    <path d="M 110 20 L 140 20" stroke="#0369a1" stroke-width="3" />
    <path d="M 125 10 L 125 30" stroke="#0369a1" stroke-width="3" />
    
    <rect x="150" y="0" width="100" height="40" rx="20" fill="#fecaca" stroke="#b91c1c" />
    <text x="200" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">DESTROY</text>
  </g>
  
  <g transform="translate(50, 110)" opacity="0.8">
    <text x="50" y="15" font-family="Arial" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">LONG</text>
    <path d="M 110 10 L 140 10" stroke="#64748b" stroke-width="2" />
    <text x="200" y="15" font-family="Arial" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">SHORT</text>
  </g>
  
  <text x="200" y="140" font-family="Arial" font-size="10" fill="#0369a1" text-anchor="middle">The second word provides the exact opposite meaning of the first.</text>
</svg>

<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="15" fill="#fdf2f8" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#be185d" text-anchor="middle">Whole vs. Part Relationship</text>
  
  <!-- Whole Item -->
  <rect x="140" y="50" width="120" height="80" rx="10" fill="#fce7f3" stroke="#be185d" stroke-width="2" />
  <text x="200" y="95" font-family="Arial" font-size="16" font-weight="bold" fill="#be185d" text-anchor="middle">THE WHOLE</text>
  
  <!-- Parts -->
  <circle cx="80" cy="150" r="30" fill="#fbcfe8" stroke="#be185d" stroke-width="1.5" />
  <text x="80" y="155" font-family="Arial" font-size="12" fill="#be185d" text-anchor="middle">Part 1</text>
  
  <circle cx="200" cy="170" r="30" fill="#fbcfe8" stroke="#be185d" stroke-width="1.5" />
  <text x="200" y="175" font-family="Arial" font-size="12" fill="#be185d" text-anchor="middle">Part 2</text>
  
  <circle cx="320" cy="150" r="30" fill="#fbcfe8" stroke="#be185d" stroke-width="1.5" />
  <text x="320" y="155" font-family="Arial" font-size="12" fill="#be185d" text-anchor="middle">Part 3</text>
  
  <!-- Links -->
  <line x1="160" y1="110" x2="105" y2="135" stroke="#be185d" stroke-width="1" stroke-dasharray="4" />
  <line x1="200" y1="130" x2="200" y2="140" stroke="#be185d" stroke-width="1" stroke-dasharray="4" />
  <line x1="240" y1="110" x2="295" y2="135" stroke="#be185d" stroke-width="1" stroke-dasharray="4" />
  
  <text x="200" y="195" font-family="Arial" font-size="10" fill="#9d174d" text-anchor="middle">Identifying the item that is the 'category' or 'whole' among its components.</text>
</svg>

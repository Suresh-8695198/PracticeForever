<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="15" fill="#fefce8" />
  <text x="200" y="35" font-family="Arial" font-size="20" font-weight="bold" fill="#854d0e" text-anchor="middle">Essential Part Logic</text>
  
  <!-- Central Object -->
  <circle cx="200" cy="110" r="45" fill="#fef08a" stroke="#854d0e" stroke-width="3" />
  <text x="200" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="#854d0e" text-anchor="middle">The Word</text>
  
  <!-- Essential Link -->
  <g>
    <path d="M 245 110 L 320 110" stroke="#854d0e" stroke-width="3" />
    <circle cx="340" cy="110" r="30" fill="#fde047" stroke="#166534" stroke-width="3" />
    <text x="340" y="115" font-family="Arial" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">ESSENTIAL</text>
  </g>
  
  <!-- Non-Essential Link -->
  <g>
    <path d="M 155 110 L 80 110" stroke="#854d0e" stroke-width="1.5" stroke-dasharray="4" />
    <circle cx="60" cy="110" r="30" fill="#fef9c3" stroke="#991b1b" stroke-width="1" stroke-dasharray="2" />
    <text x="60" y="115" font-family="Arial" font-size="10" fill="#991b1b" text-anchor="middle">Optional</text>
  </g>
  
  <text x="200" y="180" font-family="Arial" font-size="12" font-style="italic" fill="#71717a" text-anchor="middle">"Without this part, the whole cannot exist."</text>
</svg>

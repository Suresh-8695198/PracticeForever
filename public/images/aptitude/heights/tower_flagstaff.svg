<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>
  <line x1="50" y1="250" x2="350" y2="250" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- Tower -->
  <rect x="250" y="150" width="20" height="100" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <!-- Flagstaff on top -->
  <line x1="260" y1="150" x2="260" y2="80" stroke="#ef4444" stroke-width="3"/>
  <path d="M 260 80 L 285 92 L 260 105 Z" fill="#ef4444"/> <!-- Flag -->

  <!-- Observer Point P -->
  <circle cx="100" cy="250" r="4" fill="#1e40af"/>
  <text x="100" y="270" text-anchor="middle" fill="#1e40af" font-family="Arial" font-size="12" font-weight="bold">P</text>

  <!-- Line of sight to bottom of flagstaff -->
  <line x1="100" y1="250" x2="250" y2="150" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Line of sight to top of flagstaff -->
  <line x1="100" y1="250" x2="260" y2="80" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2 2"/>

  <!-- Angles -->
  <path d="M 130 250 A 30 30 0 0 0 126 237" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <text x="135" y="245" fill="#3b82f6" font-family="Arial" font-size="10" font-weight="bold">α</text>
  
  <path d="M 145 250 A 45 45 0 0 0 137 220" stroke="#2563eb" stroke-width="2" fill="none"/>
  <text x="150" y="225" fill="#2563eb" font-family="Arial" font-size="10" font-weight="bold">β</text>

  <!-- Labels -->
  <text x="320" y="200" fill="#64748b" font-family="Arial" font-size="12">Tower (H)</text>
  <text x="320" y="115" fill="#64748b" font-family="Arial" font-size="12">Flagstaff (h)</text>
</svg>

<svg width="400" height="350" viewBox="0 0 400 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="350" fill="white"/>
  <line x1="50" y1="300" x2="350" y2="300" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- Observer -->
  <rect x="80" y="230" width="10" height="70" fill="#3b82f6" rx="2"/> <!-- Man body -->
  <circle cx="85" cy="223" r="7" fill="#3b82f6"/> <!-- Man head -->
  <text x="85" y="320" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">Observer (1.6m)</text>

  <!-- Tower -->
  <rect x="300" y="100" width="20" height="200" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="310" y="320" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">Tower</text>

  <!-- Eye Level Horizontal -->
  <line x1="85" y1="223" x2="300" y2="223" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4"/>
  
  <!-- Line of sight from eye to top -->
  <line x1="85" y1="223" x2="300" y2="100" stroke="#2563eb" stroke-width="2"/>

  <!-- Angle Mark -->
  <path d="M 125 223 A 40 40 0 0 0 120 203" stroke="#2563eb" stroke-width="2" fill="none"/>
  <text x="127" y="215" fill="#2563eb" font-family="Arial" font-size="12" font-weight="bold">30°</text>
  
  <!-- Distance -->
  <line x1="85" y1="285" x2="300" y2="285" stroke="#64748b" stroke-width="1"/>
  <path d="M 85 280 L 85 290 M 300 280 L 300 290" stroke="#64748b" stroke-width="1"/>
  <text x="192" y="280" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="12">45 m</text>
</svg>

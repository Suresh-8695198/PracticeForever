<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="20" fill="#f8fafc"/>
  
  <!-- Steps/Blocks indicating order -->
  <rect x="30" y="130" width="30" height="30" rx="4" fill="#64748b"/>
  <rect x="70" y="100" width="30" height="60" rx="4" fill="#94a3b8"/>
  <rect x="110" y="70" width="30" height="90" rx="4" fill="#cbd5e1"/>
  <rect x="150" y="40" width="30" height="120" rx="4" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  
  <!-- Numbers on blocks -->
  <text x="45" y="150" text-anchor="middle" font-family="Arial" font-weight="900" font-size="16" fill="white">1</text>
  <text x="85" y="150" text-anchor="middle" font-family="Arial" font-weight="900" font-size="16" fill="white">2</text>
  <text x="125" y="150" text-anchor="middle" font-family="Arial" font-weight="900" font-size="16" fill="#64748b">3</text>
  <text x="165" y="150" text-anchor="middle" font-family="Arial" font-weight="900" font-size="16" fill="#64748b">4</text>
  
  <!-- Arrow indicating direction -->
  <path d="M40 50 H120 M110 40 L120 50 L110 60" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

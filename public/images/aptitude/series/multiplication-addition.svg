<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="20" fill="#F0F9FF"/>
  <circle cx="50" cy="100" r="25" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
  <text x="50" y="105" text-anchor="middle" fill="#1E3A8A" font-family="Plus Jakarta Sans" font-weight="bold" font-size="16">n1</text>
  
  <path d="M75 100H115" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M110 95L120 100L110 105V95Z" fill="#3B82F6"/>
  
  <rect x="80" y="60" width="40" height="25" rx="5" fill="#3B82F6"/>
  <text x="100" y="77" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans" font-weight="bold" font-size="12">× k</text>
  <rect x="80" y="115" width="40" height="25" rx="5" fill="#10B981"/>
  <text x="100" y="132" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans" font-weight="bold" font-size="12">+ x</text>

  <circle cx="150" cy="100" r="25" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" fill="#1E3A8A" font-family="Plus Jakarta Sans" font-weight="bold" font-size="16">n2</text>
  
  <path d="M175 100H215" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M210 95L220 100L210 105V95Z" fill="#3B82F6"/>
  
  <rect x="180" y="60" width="40" height="25" rx="5" fill="#3B82F6"/>
  <text x="200" y="77" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans" font-weight="bold" font-size="12">× (k+1)</text>
  <rect x="180" y="115" width="40" height="25" rx="5" fill="#10B981"/>
  <text x="200" y="132" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans" font-weight="bold" font-size="12">+ (x+1)</text>

  <circle cx="250" cy="100" r="25" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" fill="#1E3A8A" font-family="Plus Jakarta Sans" font-weight="bold" font-size="16">n3</text>
  
  <path d="M275 100H315" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M310 95L320 100L310 105V95Z" fill="#3B82F6"/>
  
  <text x="350" y="105" text-anchor="middle" fill="#3B82F6" font-family="Plus Jakarta Sans" font-weight="black" font-size="24">?</text>
  
  <text x="200" y="30" text-anchor="middle" fill="#1E3A8A" font-family="Plus Jakarta Sans" font-weight="black" font-size="18" text-transform="uppercase">Mixed Operation Series</text>
  <text x="200" y="180" text-anchor="middle" fill="#64748B" font-family="Plus Jakarta Sans" font-size="12">Pattern: (Previous Term × k) + x (where k and x may increase)</text>
</svg>

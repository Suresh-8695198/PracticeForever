<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="20" fill="#FFF7ED"/>
  
  <rect x="30" y="80" width="60" height="60" rx="12" fill="#F97316"/>
  <text x="60" y="115" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans" font-weight="black" font-size="18">1</text>
  <text x="60" y="155" text-anchor="middle" fill="#9A3412" font-family="Plus Jakarta Sans" font-weight="bold" font-size="12">1²</text>
  
  <rect x="120" y="80" width="60" height="60" rx="12" fill="#F97316"/>
  <text x="150" y="115" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans" font-weight="black" font-size="18">4</text>
  <text x="150" y="155" text-anchor="middle" fill="#9A3412" font-family="Plus Jakarta Sans" font-weight="bold" font-size="12">2²</text>
  
  <rect x="210" y="80" width="60" height="60" rx="12" fill="#F97316"/>
  <text x="240" y="115" text-anchor="middle" fill="white" font-family="Plus Jakarta Sans" font-weight="black" font-size="18">9</text>

<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="15" fill="#f5f3ff" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#7c3aed" text-anchor="middle">Matching Definitions</text>
  
  <rect x="30" y="60" width="340" height="30" rx="4" fill="white" stroke="#c4b5fd" />
  <text x="40" y="80" font-family="Arial" font-size="12" fill="#5b21b6">"The process of plants using sunlight to make food."</text>
  
  <g transform="translate(30,110)">
    <rect x="0" y="0" width="75" height="30" rx="4" fill="white" stroke="#c4b5fd" />
    <text x="37" y="20" font-family="Arial" font-size="11" fill="#6d28d9" text-anchor="middle">Respiration</text>
    
    <rect x="85" y="0" width="85" height="30" rx="4" fill="#8b5cf6" stroke="#7c3aed" />
    <text x="127" y="20" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Photosynthesis</text>
    
    <rect x="180" y="0" width="75" height="30" rx="4" fill="white" stroke="#c4b5fd" />
    <text x="217" y="20" font-family="Arial" font-size="11" fill="#6d28d9" text-anchor="middle">Oxidation</text>
    
    <rect x="265" y="0" width="75" height="30" rx="4" fill="white" stroke="#c4b5fd" />
    <text x="302" y="20" font-family="Arial" font-size="11" fill="#6d28d9" text-anchor="middle">Digestion</text>
  </g>
  
  <path d="M 200 90 L 160 110" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#purple-arrow)" />
  
  <defs>
    <marker id="purple-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6" />
    </marker>
  </defs>
  
  <text x="200" y="180" font-family="Arial" font-size="11" fill="#6d28d9" text-anchor="middle">Match descriptive phrases to the correct logical concept.</text>
</svg>

<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" rx="15" fill="#f0fdf4" />
  <text x="200" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">Semantic Categorization</text>
  
  <g transform="translate(40,60)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="#dcfce7" stroke="#15803d" />
    <text x="70" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">Synonym A</text>
    
    <rect x="180" y="0" width="140" height="40" rx="20" fill="#dcfce7" stroke="#15803d" />
    <text x="250" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">Synonym B</text>
    
    <rect x="90" y="60" width="140" height="40" rx="20" fill="#dcfce7" stroke="#15803d" />
    <text x="160" y="85" font-family="Arial" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">Synonym C</text>
    
    <rect x="180" y="110" width="140" height="40" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
    <text x="250" y="135" font-family="Arial" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">ODD WORD</text>
    
    <path d="M 160 100 L 220 120" stroke="#ef4444" stroke-width="2" marker-end="url(#red-arrow)" />
  </g>
  
  <defs>
    <marker id="red-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
  </defs>
  
  <text x="200" y="190" font-family="Arial" font-size="11" fill="#166534" text-anchor="middle">Most words share a common meaning or property (The Theme).</text>
</svg>

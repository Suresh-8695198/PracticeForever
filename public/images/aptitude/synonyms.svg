<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="20" fill="#f0fdf4"/>
  
  <!-- Left Box (Original Word) -->
  <rect x="30" y="60" width="60" height="60" rx="10" fill="white" stroke="#10b981" stroke-width="3"/>
  <text x="60" y="95" text-anchor="middle" font-family="Arial" font-weight="900" font-size="24" fill="#059669">A</text>
  
  <!-- Equal Sign -->
  <path d="M100 85 H120 M100 95 H120" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right Box (Synonym) -->
  <rect x="130" y="60" width="60" height="60" rx="10" fill="white" stroke="#10b981" stroke-width="3"/>
  <text x="160" y="95" text-anchor="middle" font-family="Arial" font-weight="900" font-size="24" fill="#059669">A'</text>
  
  <!-- Linking Curve -->
  <path d="M60 120 Q105 160 160 120" stroke="#10b981" stroke-width="2" stroke-dasharray="4 4" fill="none"/>
  
  <!-- Small Stars -->
  <circle cx="105" cy="50" r="3" fill="#10b981"/>
  <circle cx="115" cy="130" r="4" fill="#10b981"/>
</svg>

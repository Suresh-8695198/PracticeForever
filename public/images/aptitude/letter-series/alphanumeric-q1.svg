<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="150" rx="10" fill="#f8fafc" />
  <text x="20" y="40" font-family="Arial" font-size="16" fill="#64748b">Series Analysis (Vowel - Element - Symbol)</text>
  
  <!-- Series letters -->
  <g font-family="monospace" font-size="20" font-weight="bold">
    <text x="30" y="90" fill="#1e293b">2 ! 6 T @ 5 O 3 W # $ 8 E L 9</text>
    <text x="335" y="90" fill="#3b82f6">A % &amp;</text>
    <text x="395" y="90" fill="#1e293b">S 1 D F 7 G I P 4 B M 0</text>
  </g>
  
  <!-- Highlight -->
  <circle cx="345" cy="83" r="15" fill="none" stroke="#3b82f6" stroke-width="2" />
  <circle cx="365" cy="83" r="15" fill="none" stroke="#ef4444" stroke-width="2" />
  <circle cx="385" cy="83" r="15" fill="none" stroke="#22c55e" stroke-width="2" />
  
  <text x="335" y="125" font-family="Arial" font-size="12" fill="#3b82f6">Vowel (A)</text>
  <text x="355" y="140" font-family="Arial" font-size="12" fill="#ef4444">Element (%)</text>
  <text x="385" y="125" font-family="Arial" font-size="12" fill="#22c55e">Symbol (&amp;)</text>
</svg>

<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="150" rx="10" fill="#f8fafc" />
  <text x="20" y="30" font-family="Arial" font-size="14" fill="#64748b">Finding 5th to the right of the 7th number from right end</text>
  
  <g font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">
    <!-- Highlight 7th number from right -->
    <text x="50" y="80" fill="#94a3b8">2 ! 6 T @ 5 O</text>
    <text x="140" y="80" fill="#ef4444" font-size="22">3</text>
    <text x="210" y="80" fill="#1e293b">W # $ 8</text>
    <text x="270" y="80" fill="#22c55e" font-size="22">E</text>
    <text x="380" y="80" fill="#94a3b8">L 9 A % &amp; S 1 D F 7 G I P 4 B M 0</text>
  </g>
  
  <!-- Arrows -->
  <path d="M 155 75 Q 210 50 260 75" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="210" y="45" font-family="Arial" font-size="12" fill="#3b82f6" text-anchor="middle">+5 steps right</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
  </defs>
  
  <text x="140" y="110" font-family="Arial" font-size="11" fill="#ef4444" text-anchor="middle">7th number (3)</text>
  <text x="270" y="110" font-family="Arial" font-size="11" fill="#22c55e" text-anchor="middle">Result (E)</text>
</svg>

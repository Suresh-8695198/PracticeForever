<svg width="300" height="220" viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Cube Net Group -->
  <g transform="translate(50, 20)">
    <!-- Face 1 (Top) -->
    <rect x="60" y="0" width="60" height="60" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
    <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">1</text>

    <!-- Face 2 (Left) -->
    <rect x="0" y="60" width="60" height="60" fill="#fef3c7" stroke="#d97706" stroke-width="2" />
    <text x="30" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">2</text>

    <!-- Face 3 (Front) - 'A' -->
    <rect x="60" y="60" width="60" height="60" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" />
    <text x="90" y="95" text-anchor="middle" font-size="20" font-weight="black" fill="#15803d">A</text>

    <!-- Face 4 (Right) -->
    <rect x="120" y="60" width="60" height="60" fill="#fef2f2" stroke="#ef4444" stroke-width="2" />
    <text x="150" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#b91c1c">4</text>

    <!-- Face 5 (Back) - 'B' -->
    <rect x="180" y="60" width="60" height="60" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" />
    <text x="210" y="95" text-anchor="middle" font-size="20" font-weight="black" fill="#6d28d9">B</text>

    <!-- Face 6 (Bottom) -->
    <rect x="60" y="120" width="60" height="60" fill="#fafafa" stroke="#737373" stroke-width="2" />
    <text x="90" y="155" text-anchor="middle" font-size="16" font-weight="bold" fill="#404040">6</text>
    
    <!-- Legend -->
    <text x="90" y="200" text-anchor="middle" font-size="12" font-style="italic" fill="#64748b">Example 2D Net Layout</text>
  </g>
</svg>

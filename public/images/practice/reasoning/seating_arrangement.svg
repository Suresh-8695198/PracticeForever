<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Table -->
  <circle cx="100" cy="100" r="50" fill="#fef3c7" stroke="#d97706" stroke-width="3" />
  <text x="100" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">TABLE</text>
  
  <!-- Seats -->
  <!-- North (P) -->
  <circle cx="100" cy="30" r="15" fill="white" stroke="#2563eb" stroke-width="2" />
  <text x="100" y="34" text-anchor="middle" font-size="12" font-weight="bold">P</text>
  
  <!-- Right (Q) -->
  <circle cx="160" cy="70" r="15" fill="white" stroke="#2563eb" stroke-width="2" />
  <text x="160" y="74" text-anchor="middle" font-size="12" font-weight="bold">Q</text>
  
  <!-- S -->
  <circle cx="160" cy="130" r="15" fill="white" stroke="#2563eb" stroke-width="2" />
  <text x="160" y="134" text-anchor="middle" font-size="12" font-weight="bold">S</text>
  
  <!-- South (R) -->
  <circle cx="100" cy="170" r="15" fill="white" stroke="#2563eb" stroke-width="2" />
  <text x="100" y="174" text-anchor="middle" font-size="12" font-weight="bold">R</text>
  
  <!-- Left potential (T/U) -->
  <circle cx="40" cy="100" r="15" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2" />
  <text x="40" y="104" text-anchor="middle" font-size="10">T/U</text>
</svg>

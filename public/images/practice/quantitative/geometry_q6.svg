<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle with center O -->
  <circle cx="100" cy="120" r="70" stroke="#4F46E5" stroke-width="3" fill="#EEF2FF" />
  <circle cx="100" cy="120" r="4" fill="#1E1B4B" />
  
  <!-- Radius OP -->
  <line x1="100" y1="120" x2="100" y2="50" stroke="#1E1B4B" stroke-width="2" />
  
  <!-- Tangent PQ -->
  <line x1="100" y1="50" x2="210" y2="50" stroke="#EC4899" stroke-width="3" />
  
  <!-- Line OQ -->
  <line x1="100" y1="120" x2="210" y2="50" stroke="#10B981" stroke-width="2" stroke-dasharray="5 3" />
  
  <!-- Labels -->
  <text x="85" y="140" font-family="Arial" font-size="16" font-weight="bold" fill="#1E1B4B">O</text>
  <text x="95" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#1E1B4B">P</text>
  <text x="220" y="55" font-family="Arial" font-size="16" font-weight="bold" fill="#1E1B4B">Q</text>
  
  <!-- Values -->
  <text x="105" y="95" font-family="Arial" font-size="14" fill="#4338CA" rotate="-90">5 cm</text>
  <text x="145" y="105" font-family="Arial" font-size="14" fill="#059669" rotate="-32">12 cm</text>
  
  <!-- Right Angle Mark -->
  <path d="M 100 60 L 110 60 L 110 50" fill="none" stroke="#1E1B4B" stroke-width="1.5" />
</svg>

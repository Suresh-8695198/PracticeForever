<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Road -->
  <rect x="20" y="200" width="360" height="10" rx="5" fill="#94A3B8" />
  
  <!-- Left Pole -->
  <rect x="60" y="80" width="8" height="120" rx="2" fill="#475569" />
  <!-- Right Pole -->
  <rect x="332" y="80" width="8" height="120" rx="2" fill="#475569" />
  
  <!-- Point between them -->
  <circle cx="150" cy="200" r="5" fill="#EF4444" />
  
  <!-- Sight lines -->
  <line x1="68" y1="80" x2="150" y2="200" stroke="#6366F1" stroke-width="2" stroke-dasharray="4 2" />
  <line x1="332" y1="80" x2="150" y2="200" stroke="#10B981" stroke-width="2" stroke-dasharray="4 2" />
  
  <!-- Angles -->
  <path d="M 80 200 A 30 30 0 0 0 105 160" fill="none" stroke="#4F46E5" stroke-width="2" />
  <text x="90" y="190" font-family="Arial" font-size="14" fill="#4338CA" font-weight="bold">60°</text>
  
  <path d="M 300 200 A 100 100 0 0 1 230 150" fill="none" stroke="#059669" stroke-width="2" />
  <text x="240" y="190" font-family="Arial" font-size="14" fill="#047857" font-weight="bold">30°</text>
  
  <!-- Labels -->
  <text x="45" y="70" font-family="Arial" font-size="16" font-weight="bold" fill="#334155">Pole A</text>
  <text x="310" y="70" font-family="Arial" font-size="16" font-weight="bold" fill="#334155">Pole B</text>
  <text x="180" y="230" font-family="Arial" font-size="16" font-weight="bold" fill="#1E293B">Road (80 m wide)</text>
  
  <text x="35" y="140" font-family="Arial" font-size="16" font-weight="bold" fill="#334155">h</text>
  <text x="350" y="140" font-family="Arial" font-size="16" font-weight="bold" fill="#334155">h</text>
</svg>
